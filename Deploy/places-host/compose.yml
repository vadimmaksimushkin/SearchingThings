services:
  pg_places:
    image: docker.io/imresamu/postgis:18-3.6-alpine
    container_name: pg_places
    restart: unless-stopped
    mem_limit: 1g
    memswap_limit: 1g
    oom_score_adj: -500
    environment:
      POSTGRES_DB: places
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pg_places_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d places"]
      interval: 5s
      timeout: 3s
      retries: 20
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=200MB"
      - "-c"
      - "effective_cache_size=500MB"
      - "-c"
      - "work_mem=32MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "jit=on"
      - "-c"
      - "jit_above_cost=500000"

