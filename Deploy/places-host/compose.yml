services:
  pg_places:
    image: docker.io/imresamu/postgis:18-3.6-alpine
    container_name: pg_places
    restart: unless-stopped
    mem_limit: 1g
    memswap_limit: 1g
    oom_score_adj: -500
    environment:
      POSTGRES_DB: places
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pg_places_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d places"]
      interval: 5s
      timeout: 3s
      retries: 20
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=200MB"
      - "-c"
      - "effective_cache_size=500MB"
      - "-c"
      - "work_mem=32MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "jit=on"
      - "-c"
      - "jit_above_cost=500000"

  extractor:
    build:
      context: ../..
      dockerfile: Scraper/extractor.Containerfile
    image: extractor:local
    container_name: extractor
    restart: unless-stopped
    mem_limit: 80m
    memswap_limit: 80m
    environment:
      PLACES_DB_URL: postgresql://postgres:${POSTGRES_PASSWORD}@pg_places:5432/places
      QUEUE_DB_URL: ${QUEUE_DB_URL}
      IMAGE_QUEUE_DB_URL: ${IMAGE_QUEUE_DB_URL}
    depends_on:
      pg_places:
        condition: service_healthy
    command:
      - "--batch-size=1000"
      - "--interval=30"

  searchapi:
    build:
      context: ../..
      dockerfile: SearchAPI/Containerfile
    image: searchapi:local
    container_name: searchapi
    restart: unless-stopped
    mem_limit: 400m
    memswap_limit: 400m
    environment:
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      PLACES_DB_URL: postgresql://postgres:${POSTGRES_PASSWORD}@pg_places:5432/places
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
      ROOT_PATH: /api
    depends_on:
      pg_places:
        condition: service_healthy

  caddy:
    image: docker.io/library/caddy:2.11-alpine
    container_name: caddy
    restart: unless-stopped
    mem_limit: 80m
    memswap_limit: 80m
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro,Z
      - ../../FrontEnd:/srv/frontend:ro,Z
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - searchapi

volumes:
  pg_places_data:
  caddy_data:
  caddy_config:
