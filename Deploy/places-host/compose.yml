  extractor:
    build:
      context: ../..
      dockerfile: Scraper/extractor.Containerfile
    image: extractor:local
    container_name: extractor
    restart: unless-stopped
    mem_limit: 80m
    memswap_limit: 80m
    environment:
      GOOGLE_MAPS_API_KEY: ""
      PLACES_DB_URL: postgresql://postgres:${POSTGRES_PASSWORD}@pg_places:5432/places
      QUEUE_DB_URL: ${QUEUE_DB_URL}
      # IMAGE_QUEUE_DB_URL: postgresql://postgres:${POSTGRES_PASSWORD}@pg_image_queue:5432/image_queue
      IMAGE_QUEUE_DB_URL: ${IMAGE_QUEUE_DB_URL}
      R2_USER_TOKEN: ""
      R2_ACCOUNT_ID: ""
      R2_ACCESS_KEY: ""
      R2_SECRET_ACCESS_KEY: ""
      R2_BUCKET: ""
      R2_PUBLIC_URL: ""
    depends_on:
      pg_places:
        condition: service_healthy
      # pg_image_queue:
      #   condition: service_healthy
    command:
      - "--batch-size=1000"
      - "--interval=30"

  searchapi:
    build:
      context: ../..
      dockerfile: SearchAPI/Containerfile
    image: searchapi:local
    container_name: searchapi
    restart: unless-stopped
    mem_limit: 400m
    memswap_limit: 400m
    environment:
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      PLACES_DB_URL: postgresql://postgres:${POSTGRES_PASSWORD}@pg_places:5432/places
      QUEUE_DB_URL: ""
      IMAGE_QUEUE_DB_URL: ""
      R2_USER_TOKEN: ""
      R2_ACCOUNT_ID: ""
      R2_ACCESS_KEY: ""
      R2_SECRET_ACCESS_KEY: ""
      R2_BUCKET: ""
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
      ROOT_PATH: /api
    depends_on:
      pg_places:
        condition: service_healthy

  caddy:
    image: docker.io/library/caddy:2.11-alpine
    container_name: caddy
    restart: unless-stopped
    mem_limit: 80m
    memswap_limit: 80m
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro,Z
      - ../../FrontEnd:/srv/frontend:ro,Z
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - searchapi

volumes:
  pg_places_data:
  # pg_image_queue_data:
  caddy_data:
  caddy_config:
