services:
  pg_queue:
    image: docker.io/library/postgres:18-alpine
    container_name: pg_queue
    restart: unless-stopped
    mem_limit: 350m
    memswap_limit: 350m
    oom_score_adj: -500
    environment:
      POSTGRES_DB: queue
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pg_queue_data:/var/lib/postgresql
      # - ../../DBSchemas/scraper_db_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro,Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d queue"]
      interval: 5s
      timeout: 3s
      retries: 20
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=100MB"
      - "-c"
      - "effective_cache_size=200MB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "jit=off"
      - "-c"
      - "wal_compression=on"
      - "-c"
      - "autovacuum_vacuum_scale_factor=0.05"

  scraper:
    build:
      context: ../..
      dockerfile: Scraper/scraper.Containerfile
    image: scraper:local
    container_name: scraper
    restart: unless-stopped
    mem_limit: 1700m
    memswap_limit: 1700m
    environment:
      QUEUE_DB_URL: postgresql://postgres:${POSTGRES_PASSWORD}@pg_queue:5432/queue
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY: ${R2_ACCESS_KEY}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_PAGES_BUCKET: ${R2_PAGES_BUCKET}
    depends_on:
      pg_queue:
        condition: service_healthy
    command:
      - "--workers=3"
      - "--max-attempts=3"
      - "--poll-interval=1.0"

volumes:
  pg_queue_data:
