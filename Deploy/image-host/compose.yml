services:
  pg_image_queue:
    image: docker.io/library/postgres:18-alpine
    container_name: pg_image_queue
    restart: unless-stopped
    mem_limit: 350m
    memswap_limit: 350m
    oom_score_adj: -500
    environment:
      POSTGRES_DB: image_queue
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pg_image_queue_data:/var/lib/postgresql
      # - ../../DBSchemas/003_image_queue_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro,Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d image_queue"]
      interval: 5s
      timeout: 3s
      retries: 20
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=100MB"
      - "-c"
      - "effective_cache_size=200MB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "jit=off"
      - "-c"
      - "wal_compression=on"
      - "-c"
      - "autovacuum_vacuum_scale_factor=0.05"

  image_scraper:
    build:
      context: ../..
      dockerfile: Scraper/image_scraper.Containerfile
    image: image_scraper:local
    container_name: image_scraper
    restart: unless-stopped
    init: true
    mem_limit: 800m
    memswap_limit: 800m
    environment:
      GOOGLE_MAPS_API_KEY: ""
      PLACES_DB_URL: ""
      QUEUE_DB_URL: ""
      IMAGE_QUEUE_DB_URL: postgresql://postgres:${POSTGRES_PASSWORD}@pg_image_queue:5432/image_queue
      R2_USER_TOKEN: ${R2_USER_TOKEN}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY: ${R2_ACCESS_KEY}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET: ${R2_BUCKET}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
    depends_on:
      pg_image_queue:
        condition: service_healthy
    command:
      - "--poll-interval=1.0"

volumes:
  pg_image_queue_data:
