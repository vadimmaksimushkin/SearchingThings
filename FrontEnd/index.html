  <body>
    <h1>Map test</h1>

    <label>Lat: <input id="lat-input" type="number" step="any" value="19.416654"/></label>
    <label>Lon: <input id="lon-input" type="number" step="any" value="-99.137536"/></label>
    <br/>
    <label>Radius: <input id="radius-input" type="number" min="1" step="100" value="500"/></label> <!-- in meters -->

    <br/>
    <button id="search-btn">Search</button>
    <button id="clear-btn">Clear</button>
    <gmp-map center="19.416654, -99.137536" zoom="12" map-id="DEMO_MAP_ID"></gmp-map>
    <h3>Places</h3>
    <div id="places-list"></div>
