<html lang="en">
  <head>
    <title>Map test</title>
    <link rel="stylesheet" type="text/css" href="styles/styles.css" />
    <!-- //NOSONAR --> <script src="https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js"></script>
    <script type="module" src="scripts/script.js"></script>

      (g=>{var h,a,k,p="The Google Maps JavaScript API",c="google",l="importLibrary",q="__ib__",m=document,b=window;b=b[c]||(b[c]={});var d=b.maps||(b.maps={}),r=new Set,e=new URLSearchParams,u=()=>h||(h=new Promise(async(f,n)=>{await (a=m.createElement("script"));e.set("libraries",[...r]+"");for(k in g)e.set(k.replace(/[A-Z]/g,t=>"_"+t[0].toLowerCase()),g[k]);e.set("callback",c+".maps."+q);a.src=`https://maps.${c}apis.com/maps/api/js?`+e;d[q]=f;a.onerror=()=>h=n(Error(p+" could not load."));a.nonce=m.querySelector("script[nonce]")?.nonce||"";m.head.append(a)}));d[l]?console.warn(p+" only loads once. Ignoring:",g):d[l]=(f,...n)=>r.add(f)&&u().then(()=>d[l](f,...n))})({

  <body>
    <h1>Map test</h1>

    <label>Lat: <input id="lat-input" type="number" step="any" value="19.416654" min="-90" max="90"/></label>
    <label>Lon: <input id="lon-input" type="number" step="any" value="-99.137536" min="-180" max="180"/></label>
    <br/>
    <label>Radius: <input id="radius-input" type="number" min="1" max="50000" step="100" value="50000"/></label> <!-- in meters -->
    <label>Max results: <input id="max-results-input" type="number" min="1" max="2000" step="10" value="200"/></label>
    <label><input id="location-is-rectangle-input" type="checkbox"/>Location rectangle type (no for circle type)</label>
    <br/>
    <!-- //NOSONAR --> <!-- <label>Type: <input id="type-input" type="text" value="gym" /></label> -->
    <label>Type:
      <select id="type-input">
        <option value="gym">gym</option>
        <option value="shopping mall">shopping mall</option>
      </select>
    </label>
    <br/>
    <label><input id="local-only" type="checkbox" checked="true" disabled="true"/> Local DB only</label>
    <!-- //NOSONAR --> <!-- <label><input id="local-only" type="checkbox" checked="true"/> Local DB only</label> -->
    <label><input id="include-reviews-input" type="checkbox"/> Include reviews</label>
    <label><input id="include-photos-input" type="checkbox"/> Include photos</label>
    <br/>
    <button id="search-btn">Search</button>
    <button id="clear-btn">Clear</button>
    <gmp-map center="19.416654, -99.137536" zoom="12" map-id="DEMO_MAP_ID"></gmp-map>
    <h3>Places</h3>
    <button id="reset-view-btn">Reset view</button>
    <button id="export-btn">Download search results</button>
    <span id="export-status" aria-live="polite"></span>
    <section id="places-list">
      <div class="places-header">
        <div id="header-query-time">Query time (ms)</div>
        <div id="header-type">Type</div>
        <div id="header-name">Name</div>
        <div id="header-rating" class="header-clickable">Rating</div>
        <div id="header-rating-count" class="header-clickable">Rating count</div>
        <div id="header-website" class="header-clickable">Website</div>
        <div id="header-emails" class="header-clickable">Emails</div>
        <div id="header-phone" class="header-clickable">Phone</div>
        <div id="header-photo">Photo</div>
      </div>
    </section>
    <section id="debug-section">
      <h3>Debug</h3>
      <pre id="debug"></pre>
      <h3>Raw NDJSON</h3>
      <pre id="debug2"></pre>
    </section>
  </body>
</html>
